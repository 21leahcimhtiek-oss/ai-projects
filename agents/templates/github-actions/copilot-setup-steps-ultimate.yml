# Copilot Ultimate Setup Steps - Maximum Autonomy Configuration
# This provides Copilot with everything needed to complete projects correctly

name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: write
      packages: write
      deployments: write
      security-events: write
      id-token: write
    
    env:
      # Node.js
      NODE_VERSION: "20"
      # Python
      PYTHON_VERSION: "3.11"
      # Go
      GO_VERSION: "1.22"
      # Rust
      RUST_VERSION: "stable"
    
    steps:
      # ===========================================
      # Repository Checkout with Full History
      # ===========================================
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          lfs: true
          fetch-depth: 0
          submodules: recursive
      
      # ===========================================
      # System Dependencies
      # ===========================================
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            git \
            jq \
            yq \
            unzip \
            zip \
            gnupg \
            software-properties-common \
            cmake \
            ninja-build \
            pkg-config \
            libssl-dev \
            libcurl4-openssl-dev \
            libsecret-1-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsodium-dev \
            libuv1-dev \
            libicu-dev \
            python3-dev \
            python3-pip \
            python3-venv
      
      # ===========================================
      # Node.js Environment
      # ===========================================
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          registry-url: "https://registry.npmjs.org"
      
      - name: Install global Node.js tools
        run: |
          npm install -g \
            npm@latest \
            yarn \
            pnpm \
            typescript \
            ts-node \
            tsx \
            nodemon \
            eslint \
            prettier \
            @biomejs/biome \
            turbo \
            nx \
            lerna \
            semantic-release \
            commitizen \
            cz-conventional-changelog \
            standard-version \
            npm-check-updates \
            serve \
            http-server \
            pm2 \
            @anthropic-ai/claude-code \
            @google/gemini-cli \
            expo-cli \
            eas-cli \
            @azure/azure-cli \
            firebase-tools
      
      - name: Install Node.js dependencies
        run: |
          if [ -f package.json ]; then
            if [ -f pnpm-lock.yaml ]; then
              pnpm install --frozen-lockfile
            elif [ -f yarn.lock ]; then
              yarn install --frozen-lockfile
            else
              npm ci --prefer-offline --no-audit
            fi
          fi
      
      # ===========================================
      # Python Environment
      # ===========================================
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      
      - name: Install Python tools
        run: |
          pip install --upgrade pip setuptools wheel
          pip install \
            black \
            ruff \
            mypy \
            pytest \
            pytest-cov \
            pytest-asyncio \
            pytest-xdist \
            coverage \
            tox \
            pre-commit \
            poetry \
            pdm \
            uv \
            httpx \
            requests \
            aiohttp \
            pydantic \
            fastapi \
            uvicorn \
            gunicorn \
            celery \
            redis \
            sqlalchemy \
            alembic \
            pymongo \
            psycopg2-binary \
            google-cloud-firestore \
            firebase-admin \
            openai \
            anthropic \
            google-generativeai \
            langchain \
            langchain-core \
            langchain-community \
            langchain-openai \
            langchain-anthropic \
            crewai \
            autogen-agentchat \
            pyautogen \
            llama-index \
            transformers \
            torch \
            tensorflow \
            scikit-learn \
            pandas \
            numpy \
            polars \
            scipy \
            matplotlib \
            seaborn \
            plotly \
            streamlit \
            gradio
      
      - name: Install Python dependencies
        run: |
          if [ -f pyproject.toml ]; then
            if command -v poetry &> /dev/null; then
              poetry install --no-interaction
            elif command -v pdm &> /dev/null; then
              pdm install --check
            elif command -v uv &> /dev/null; then
              uv pip install -e .
            fi
          elif [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
      
      # ===========================================
      # Go Environment
      # ===========================================
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      
      - name: Install Go tools
        run: |
          go install golang.org/x/tools/gopls@latest
          go install github.com/go-delve/delve/cmd/dlv@latest
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          go install github.com/mgechev/revive@latest
          go install honnef.co/go/tools/cmd/staticcheck@latest
          go install github.com/swaggo/swag/cmd/swag@latest
          go install github.com/go-critic/go-critic/cmd/gocritic@latest
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          go install github.com/goreleaser/goreleaser/v2@latest
      
      - name: Install Go dependencies
        run: |
          if [ -f go.mod ]; then
            go mod download
            go mod verify
          fi
      
      # ===========================================
      # Rust Environment
      # ===========================================
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt, rust-analyzer, rust-src
      
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
      
      - name: Install Rust tools
        run: |
          cargo install cargo-audit
          cargo install cargo-outdated
          cargo install cargo-tarpaulin
          cargo install cargo-nextest
          cargo install cargo-watch
          cargo install cargo-release
          cargo install trunk
          cargo install wasm-pack
      
      - name: Build Rust project
        run: |
          if [ -f Cargo.toml ]; then
            cargo fetch
            cargo build --all-features
          fi
      
      # ===========================================
      # Docker Environment
      # ===========================================
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Docker Hub
        if: ${{ secrets.DOCKER_TOKEN }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      
      - name: Log in to GitHub Container Registry
        if: ${{ secrets.GITHUB_TOKEN }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      # ===========================================
      # Cloud CLIs
      # ===========================================
      - name: Install Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          version: "latest"
      
      - name: Install Azure CLI
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
      
      - name: Install AWS CLI
        run: |
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip awscliv2.zip
          sudo ./aws/install
          rm -rf awscliv2.zip aws
      
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      
      - name: Install Vercel CLI
        run: npm install -g vercel
      
      - name: Install Netlify CLI
        run: npm install -g netlify-cli
      
      # ===========================================
      # Security & Quality Tools
      # ===========================================
      - name: Install security scanning tools
        run: |
          npm install -g snyk
          pip install bandit semgrep trivy
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
      
      - name: Run security audit
        continue-on-error: true
        run: |
          if [ -f package.json ]; then
            npm audit --audit=moderate || true
          fi
      
      # ===========================================
      # MCP Server Setup
      # ===========================================
      - name: Install MCP servers
        run: |
          npm install -g @modelcontextprotocol/server-github
          npm install -g @modelcontextprotocol/server-filesystem
          npm install -g @modelcontextprotocol/server-postgres
          npm install -g @modelcontextprotocol/server-sqlite
          npm install -g @modelcontextprotocol/server-slack
          pip install mcp-server-git
      
      # ===========================================
      # Agent Configuration
      # ===========================================
      - name: Create agent workspace
        run: |
          mkdir -p .agent/{sessions,outputs,cache,logs}
          mkdir -p .github/agents
      
      - name: Set up agent configuration
        run: |
          cat > .agent/config.json << 'EOF'
          {
            "version": "1.0.0",
            "autonomy_level": "maximum",
            "quality_gates": {
              "tests_required": true,
              "coverage_minimum": 80,
              "linting_strict": true,
              "security_scan": true,
              "type_check": true
            },
            "completion_criteria": {
              "all_tests_passing": true,
              "no_security_vulnerabilities": true,
              "documentation_updated": true,
              "changelog_updated": true
            }
          }
          EOF
      
      # ===========================================
      # Environment Summary
      # ===========================================
      - name: Print environment summary
        run: |
          echo "========================================"
          echo "Copilot Environment Ready"
          echo "========================================"
          echo "Node.js: $(node --version)"
          echo "Python: $(python --version)"
          echo "Go: $(go version || echo 'not installed')"
          echo "Rust: $(rustc --version || echo 'not installed')"
          echo "Docker: $(docker --version)"
          echo "Google Cloud: $(gcloud --version | head -1)"
          echo "Azure CLI: $(az --version | head -1)"
          echo "AWS CLI: $(aws --version)"
          echo "Firebase: $(firebase --version)"
          echo "Expo: $(expo --version || echo 'not installed')"
          echo "========================================"
          echo "Ready for maximum autonomy execution"
          echo "========================================"